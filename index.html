<head>
    <title>Quest Clicker</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/knight.webp">
</head>

<body>
    <div id="header" style="text-align: center; font-family: 'MedievalSharp', cursive;">
        <h1 id="title">Quest Clicker!</h1>
        <button id="help-btn">Help / Instructions</button>
        <div id="help-text" style="display:none;">
            <p style="background-color: white;">Click the terrain to earn gold. Use gold in the Store to buy weapon
                upgrades and hire allies. More upgrades become accessible with more allies.</p>
        </div>
        <audio id="bgm">
            <source src="music/bgm.mp3" type="audio/mpeg">
        </audio>
        <p style="color:white">Click the button for some adventuring music!</p>
        <button onclick="bgm.play()" type="button">Play</button>
        <button onclick="bgm.load()" type="button">Pause</button>
    </div>
    <hr>

    <div id="message-bar" class="popup-message"></div>

    <div class="main-container">
        <div class="column">
            <div class="hit">
                <h1>Gold</h1>
                <h1 id="score1">0</h1>
                <p id="count">Gold earned per second</p>
            </div>

            <div class="pic">
                <input type="image" src="images/chest.png" id="countbutton" class="clickme" alt="Attack!">
            </div>
        </div>

        <div class="column">
            <h1>Gallery</h1>
            <h2>Heroes</h2>
            <div id="heroes">
                <img src="images/knight.webp" width="80">
                <img src="images/witch.webp" width="80" hidden>
                <img src="images/rouge.webp" width="80" hidden>
                <img src="images/alchemist.webp" width="80" hidden>
                <img src="images/archer.webp" width="80" hidden>
                <img src="images/bard.webp" width="80" hidden>
                <img src="images/paladin.webp" width="80" hidden>
                <img src="images/necromancer.webp" width="80" hidden>
                <img src="images/priest.webp" width="80" hidden>
            </div>
            <h2>Achievements</h2>
            <div id="reward-list"></div>
        </div>

        <div class="column">
            <h1>Store</h1>
            <hr>
            <h2>Weapons</h2>
            <button type="button" id="shop1" class="store-btn" disabled>Wooden Sword</button>
            <button type="button" id="shop3" class="store-btn" disabled>Wooden Staff</button>
            <button type="button" id="shop4" class="store-btn" disabled>Wooden Knife</button>
            <button type="button" id="shop5" class="store-btn" disabled>Simple Potion</button>
            <button type="button" id="shop6" class="store-btn" disabled>Wooden Bow</button>
            <hr>
            <h2>Allies</h2>
            <button type="button" id="shop2" class="store-btn" disabled>Hire Mercenary</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
