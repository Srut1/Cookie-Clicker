<head>
    <title>Quest Clicker</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header" style="text-align: center; font-family: 'MedievalSharp', cursive;">
        <h1>Quest for the Demon King</h1>
        <p>Forge your destiny and defeat the dark forces!</p>

        <button id="help-btn">Help / Instructions</button>
        <div id="help-text" style="display:none;">
            <p>Click the terrain to earn gold. Use gold in the Store to buy weapon upgrades and hire allies.</p>
        </div>
    </div>
    <hr>
    
    <div id="message-bar" class="popup-message"></div>

    <div class="main-container">
        <div class="column">
            <div class="hit">
                <h1>Gold</h1>
                <h1 id="score1">0</h1>
            </div>

            <div class="pic">
                <input type="image" src="images/grass.jpg" id="countbutton" class="clickme" alt="Attack!">
                <img src="images/slime.png" class="slime" width="100">
            </div>
        </div>

        <div class="column">
            <h1>Gallery</h1>
            <h2>Heroes</h2>
            <div id="heroes">
                <img src="images/knight.webp" width="80">
                <img src="images/witch.webp" width="80" hidden>
                <img src="images/bard.webp" width="80" hidden>
                <img src="images/rouge.webp" width="80" hidden>
                <img src="images/archer.webp" width="80" hidden>
                <img src="images/alchemist.webp" width="80" hidden>
                <img src="images/paladin.webp" width="80" hidden>
                <img src="images/necromancer.webp" width="80" hidden>
                <img src="images/priest.webp" width="80" hidden>
            </div>
            <h2>Achievements</h2>
            <div id="reward-list"></div>
        </div>

        <div class="column">
            <h1>Store</h1>
            <hr>
            <h2>Weapons</h2>
            <button type="button" id="shop1" class="store-btn" disabled>Wooden Sword</button>
            <hr>
            <h2>Allies</h2>
            <button type="button" id="shop2" class="store-btn" disabled>Hire Mercenary</button>
        </div>
    </div>

    <script src="js/cookie.js"></script>
</body>
</html>
